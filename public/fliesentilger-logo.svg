<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <!-- Red accent bar top -->
  <rect x="0" y="0" width="400" height="4" fill="#CC0000" rx="1"/>

  <!-- FLIESENTECHNIK text -->
  <text x="200" y="30" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="16" fill="#1A1A1A" letter-spacing="3">FLIESENTECHNIK</text>

  <!-- TILGER large text -->
  <text x="10" y="78" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="56" fill="#1A1A1A" letter-spacing="2">TIL</text>

  <!-- G with GOTTFRIED inside -->
  <text x="175" y="78" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="56" fill="#1A1A1A">G</text>
  <!-- GOTTFRIED text inside G -->
  <text x="192" y="68" font-family="Arial, sans-serif" font-weight="700" font-size="8" fill="#CC0000" letter-spacing="0.5">GOTTFRIED</text>

  <!-- ER text -->
  <text x="225" y="78" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="56" fill="#CC0000" letter-spacing="2">ER</text>

  <!-- Red accent bar -->
  <rect x="0" y="88" width="400" height="3" fill="#CC0000" rx="1"/>

  <!-- NATURSTEINTEPPICH text -->
  <text x="200" y="110" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="16" fill="#1A1A1A" letter-spacing="3">NATURSTEINTEPPICH</text>

  <!-- Bottom red accent -->
  <rect x="0" y="116" width="400" height="4" fill="#CC0000" rx="1"/>
</svg>
